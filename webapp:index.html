<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uz Give - Telegram Stars</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <button class="close-btn" onclick="closeApp()">Close</button>
                <div class="app-title">
                    <div class="title-main">Uz Give</div>
                    <div class="title-sub">mini app</div>
                </div>
                <button class="menu-btn">⋯</button>
            </div>
            
            <div class="balance-section">
                <div class="logo">🎁</div>
                <div class="app-name">Uz Give</div>
                <div class="balance">
                    <span id="balance">0 so'm</span>
                    <button class="add-btn" onclick="addBalance()">+</button>
                </div>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('stars')">Stars olish</button>
                <button class="tab-btn" onclick="switchTab('premium')">Premium olish</button>
                <button class="tab-btn" onclick="switchTab('gift')">Gift olish</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <div class="section-title">
                <span class="star-icon">⭐</span>
                Telegram Stars sotib olish
            </div>

            <!-- Recipient -->
            <div class="form-group">
                <label class="form-label">Qabul qiluvchi</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" class="form-input" placeholder="Username kiriting">
                    <button class="self-btn" onclick="setSelf()">O'zim uchun</button>
                </div>
            </div>

            <!-- Stars Amount -->
            <div class="form-group">
                <label class="form-label">Stars miqdori</label>
                <div class="amount-wrapper">
                    <div class="amount-input-wrapper">
                        <span class="edit-icon">✏️</span>
                        <input type="number" id="starsAmount" class="amount-input" value="50" readonly>
                    </div>
                    <div class="price-display" id="priceDisplay">10 000 so'm</div>
                </div>

                <div class="quick-select">
                    <button class="quick-btn active" onclick="selectStars(50)">50</button>
                    <button class="quick-btn" onclick="selectStars(75)">75</button>
                    <button class="quick-btn" onclick="selectStars(100)">100</button>
                    <button class="quick-btn" onclick="selectStars(250)">250</button>
                    <button class="quick-btn" onclick="selectStars(500)">500</button>
                </div>
            </div>

            <!-- Buy Button -->
            <button class="buy-button" onclick="buyStars()">
                Sotib olish
            </button>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="nav-item active" onclick="navTo('menu')">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Menyu</span>
            </button>
            <button class="nav-item" onclick="navTo('gift')">
                <span class="nav-icon">🎁</span>
                <span class="nav-text">Gift</span>
            </button>
            <button class="nav-item" onclick="navTo('rating')">
                <span class="nav-icon">🏆</span>
                <span class="nav-text">Reyting</span>
            </button>
            <button class="nav-item" onclick="navTo('profile')">
                <span class="nav-icon">👤</span>
                <span class="nav-text">Profil</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
