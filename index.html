<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uz Give</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js?v=2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="languageModal" class="modal">
        <div class="modal-content">
            <h2>Выберите язык / Tilni tanlang</h2>
            <button class="lang-btn" onclick="selectLanguage('ru')">🇷🇺 Русский</button>
            <button class="lang-btn" onclick="selectLanguage('uz')">🇺🇿 O'zbekcha</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-top">
                <button class="close-btn" onclick="closeApp()">Close</button>
                <div class="app-title">
                    <div class="title-main">Uz Give</div>
                    <div class="title-sub">mini app</div>
                </div>
                <button class="menu-btn">⋯</button>
            </div>
            
            <div class="balance-section">
                <div class="logo">🎁</div>
                <div class="app-name">Uz Give</div>
                <div class="balance">
                    <span id="balance">0 so'm</span>
                    <button class="add-btn" onclick="showTopupModal()">+</button>
                </div>
            </div>

            <div class="language-switcher">
                <button onclick="toggleLanguage()" class="lang-switch-btn">
                    🌐 <span id="currentLangText">UZ</span>
                </button>
            </div>
            
            <div class="tab-buttons">
                <button class="tab-btn active" data-tab="stars" onclick="switchTab('stars')">Stars</button>
                <button class="tab-btn" data-tab="gift" onclick="switchTab('gift')">Gift</button>
                <button class="tab-btn" data-tab="rating" onclick="switchTab('rating')">Rating</button>
                <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">Profile</button>
            </div>
        </div>

        <div id="starsTab" class="tab-content active">
            <div class="section-title">
                <span class="star-icon">⭐</span>
                <span id="starsTitle">Telegram Stars</span>
            </div>

            <div class="form-group">
                <label class="form-label" id="recipientLabel">Qabul qiluvchi</label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="username" class="form-input" placeholder="Username">
                    <button class="self-btn" id="selfBtn" onclick="setSelf()">O'zim</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" id="amountLabel">Stars miqdori</label>
                <div class="amount-wrapper">
                    <div class="amount-input-wrapper">
                        <span class="edit-icon">✏️</span>
                        <input type="number" id="starsAmount" class="amount-input" value="50" readonly>
                    </div>
                    <div class="price-display" id="priceDisplay">10 000 so'm</div>
                </div>

                <div class="quick-select">
                    <button class="quick-btn active" onclick="selectStars(50)">50</button>
                    <button class="quick-btn" onclick="selectStars(75)">75</button>
                    <button class="quick-btn" onclick="selectStars(100)">100</button>
                    <button class="quick-btn" onclick="selectStars(250)">250</button>
                    <button class="quick-btn" onclick="selectStars(500)">500</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Yoki o'z miqdoringiz</label>
                <div class="custom-amount-wrapper">
                    <input type="number" id="customStars" class="custom-input" placeholder="150">
                    <button class="custom-btn" onclick="setCustomStars()">OK</button>
                </div>
            </div>

            <button class="buy-button" onclick="buyStars()">Sotib olish</button>
        </div>

        <div id="giftTab" class="tab-content">
            <div class="section-title">
                <span class="gift-icon">🎁</span>
                <span id="giftTitle">Sovg'alar</span>
            </div>
            <div class="gifts-grid" id="giftsGrid"></div>
        </div>

        <div id="ratingTab" class="tab-content">
            <div class="section-title">
                <span class="trophy-icon">🏆</span>
                <span id="ratingTitle">Top</span>
            </div>
            <div class="rating-list" id="ratingList"></div>
        </div>

        <div id="profileTab" class="tab-content">
            <div class="section-title">
                <span class="profile-icon">👤</span>
                <span id="profileTitle">Profil</span>
            </div>
            
            <div class="profile-info">
                <div class="profile-stat">
                    <span class="stat-label">Jami</span>
                    <span class="stat-value" id="totalSpentValue">0 so'm</span>
                </div>
                <div class="profile-stat">
                    <span class="stat-label">Xaridlar</span>
                    <span class="stat-value" id="totalPurchasesValue">0</span>
                </div>
            </div>

            <div class="history-title">Tarix</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="navTo('menu')">
            <span class="nav-icon">🏠</span>
            <span class="nav-text">Menu</span>
        </button>
        <button class="nav-item" onclick="navTo('gift')">
            <span class="nav-icon">🎁</span>
            <span class="nav-text">Gift</span>
        </button>
        <button class="nav-item" onclick="navTo('rating')">
            <span class="nav-icon">🏆</span>
            <span class="nav-text">Rating</span>
        </button>
        <button class="nav-item" onclick="navTo('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-text">Profile</span>
        </button>
    </div>

    <div class="support-btn" onclick="openSupport()">
        <span>💬</span>
        <span>Поддержка</span>
    </div>

    <script src="script.js?v=3"></script>
    
    <script>
        function openSupport() {
            window.open('https://t.me/stars_support_manager', '_blank');
        }
    </script>
</body>
</html>
